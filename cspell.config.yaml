version: "0.2"
language: en-US,de

import:
  - "@cspell/dict-de-de/cspell-ext.json"

dictionaries:
  - en_US
  - de-de

allowCompoundWords: true
useGitignore: true

ignorePaths:
  - .git
  - .github
  - _site/**
  - _freeze/**
  - renv/**
  - site_libs/**
  - assets/bootstrap-5.3.8-dist/**
  - assets/fontawesome-free-7.1.0-web/**
  - "**/*.svg"
  - "**/*.png"
  - "**/*.jpg"
  - "**/*.jpeg"
  - "**/*.gif"
  - "**/*.webp"
  - "**/*.pdf"

# Reject common British spellings to keep US spelling consistent.
flagWords:
  - colour
  - colours
  - coloured
  - colouring
  - organise
  - organised
  - organising
  - organisation
  - organisations
  - recognise
