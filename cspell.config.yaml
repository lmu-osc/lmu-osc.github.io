version: "0.2"
language: en-US,de

import:
  - "@cspell/dict-de-de/cspell-ext.json"

dictionaries:
  - en_US
  - de-de
  - osc-names
  - osc-acronyms
  - osc-german
  - osc-other

allowCompoundWords: true
useGitignore: true

ignorePaths:
  - .git
  - .github
  - _site/**
  - _freeze/**
  - renv/**
  - site_libs/**
  - assets/bootstrap-5.3.8-dist/**
  - assets/fontawesome-free-7.1.0-web/**
  - "**/*.svg"
  - "**/*.png"
  - "**/*.jpg"
  - "**/*.jpeg"
  - "**/*.gif"
  - "**/*.webp"
  - "**/*.pdf"

# Reject common British spellings to keep US spelling consistent.
flagWords:
  - colour
  - colours
  - coloured
  - colouring
  - organise
  - organised
  - organising
  - organisation
  - organisations
  - recognise
  - recognised
  - recognising
  - analyse
  - analysed
  - analysing
  - behaviour
  - behaviours
  - centre
  - centres
  - metre
  - metres
  - labour
  - travelled
  - travelling
  - traveller
  - cancelling
  - cancelled
  - licence
  - practise
  - artefact

dictionaryDefinitions:
  - name: osc-names
    path: config/cspell/names.txt
    addWords: true
  - name: osc-acronyms
    path: config/cspell/acronyms.txt
    addWords: true
  - name: osc-german
    path: config/cspell/german.txt
    addWords: true
  - name: osc-other
    path: config/cspell/other.txt
    addWords: true
