name: Links

on:
  repository_dispatch:
  workflow_dispatch:
  schedule:
    - cron: "00 18 10 * *"

jobs:
  linkChecker:
    runs-on: ubuntu-latest
    permissions:
      issues: write # required for peter-evans/create-issue-from-file
    steps:
      - uses: actions/checkout@v5

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          fail: false
          args: >-
            --root-dir "$(pwd)"
            --no-progress
            --exclude-path '(^|.*/)events/events/templates/event-template\.html$'
            --exclude-path '(^|.*/)people/people/templates/people-template\.html$'
            --exclude-path '(^|.*/)_[^/]*\.qmd$'    # Exclude all .qmd files that start with an underscore (e.g., templates, partials)
            './**/*.md'
            './**/*.html'
            './**/*.rst'
            './**/*.qmd'

      - name: Create Issue From File
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: Link Checker Report
          content-filepath: ./lychee/out.md
          labels: report, automated issue