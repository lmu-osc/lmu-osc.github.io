# This file controls the optional site-wide announcement bar.
# Quarto reads this file via metadata-files in _quarto.yml.
#
# Important: this file cannot be completely empty. Keep at least "{}" when no announcement is active.
# Docs: https://quarto.org/docs/websites/website-tools.html#announcement-bar

# Default state (no announcement):
# {}

# To enable an announcement, comment out the "{}" and add the following content, customizing as needed:
website:
  announcement:
    icon: info-circle
    dismissable: true
    content: '**Welcome to the new LMU Open Science Center website! Notice something out of date or incorrect? <a href="mailto:patrick.callahan@lmu.de?subject=OSC%20Website%20Edits">Let us know!</a>**'
    type: primary
    position: below-navbar


